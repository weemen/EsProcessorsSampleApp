es-processors-sagas {
    recovery {
        strategy {
            type = "local"
            local {
                storage_path = "/tmp"
            },
            redis {
                host = localhost
                port = 6379
                username = "es-processors-sagas"
                password = "es-processors-sagas"
            }
        }
    }
}

pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
}